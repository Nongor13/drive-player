<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ceremixtape</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Unbounded:wght@300;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #0a1628;
    --surface: #0e1f3a;
    --card:    #132848;
    --border:  #1a3a5c;
    --accent:  #ff8c00;
    --accent2: #2a9fd6;
    --text:    #e0f2ff;
    --muted:   #5b9ec9;
    --radius:  14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; padding: 32px 16px 48px; overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 999;
  }
  header {
    width: 100%; max-width: 640px;
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 36px;
  }
  .logo { font-family: 'Unbounded', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 0.1em; color: var(--accent); text-transform: uppercase; }
  .track-count { font-size: 11px; color: var(--muted); letter-spacing: 0.05em; }

  .now-playing {
    width: 100%; max-width: 640px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 28px 28px 24px;
    margin-bottom: 24px; position: relative; overflow: hidden;
  }
  .now-playing::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    opacity: 0; transition: opacity .4s;
  }
  .now-playing.playing::before { opacity: 1; }

  /* ── Cover ── */
  .vinyl-wrap { display: flex; align-items: center; gap: 24px; margin-bottom: 24px; }
  .cover {
    width: 72px; height: 72px; flex-shrink: 0;
    border-radius: 10px; overflow: hidden;
    background: var(--surface); border: 1px solid var(--border);
    box-shadow: 0 4px 20px #0006;
    transition: box-shadow .3s;
    display: flex; align-items: center; justify-content: center;
  }
  .now-playing.playing .cover { box-shadow: 0 4px 28px #ff8c0033; }
  .cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .cover-fallback {
    width: 48px; height: 48px; border-radius: 50%;
    background: conic-gradient(
      #0a1a30 0deg 30deg, #1a3a5c 30deg 60deg,
      #0a1a30 60deg 90deg, #1a3a5c 90deg 120deg,
      #0a1a30 120deg 150deg, #1a3a5c 150deg 180deg,
      #0a1a30 180deg 210deg, #1a3a5c 210deg 240deg,
      #0a1a30 240deg 270deg, #1a3a5c 270deg 300deg,
      #0a1a30 300deg 330deg, #1a3a5c 330deg 360deg
    );
    animation: spin 4s linear infinite paused;
  }
  .now-playing.playing .cover-fallback { animation-play-state: running; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .track-info { flex: 1; min-width: 0; }
  .track-label { font-size: 10px; color: var(--accent); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 6px; }
  .track-title { font-family: 'Unbounded', sans-serif; font-size: 15px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
  .track-index { font-size: 11px; color: var(--muted); }

  .progress-wrap { margin-bottom: 20px; cursor: pointer; }
  .progress-times { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); margin-bottom: 8px; }
  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; width: 0%; transition: width .1s linear; }

  .controls { display: flex; align-items: center; justify-content: center; gap: 16px; }
  .btn { background: none; border: none; cursor: pointer; color: var(--muted); transition: color .2s, transform .15s; display: flex; align-items: center; justify-content: center; padding: 6px; border-radius: 50%; }
  .btn:hover { color: var(--text); transform: scale(1.1); }
  .btn:active { transform: scale(0.95); }
  .btn-play { width: 52px; height: 52px; background: var(--accent); color: var(--bg) !important; border-radius: 50%; box-shadow: 0 0 24px #ff8c0044; transition: background .2s, box-shadow .2s, transform .15s; }
  .btn-play:hover { background: #ffaa33; box-shadow: 0 0 32px #ff8c0066; }
  .btn-shuffle, .btn-repeat { font-size: 10px; letter-spacing: .05em; padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); transition: all .2s; }
  .btn-shuffle.active, .btn-repeat.active { border-color: var(--accent); color: var(--accent); background: #c8f04a11; }

  .volume-row { display: flex; align-items: center; gap: 10px; margin-top: 20px; padding-top: 18px; border-top: 1px solid var(--border); }
  .volume-row svg { color: var(--muted); flex-shrink: 0; }
  input[type=range] { -webkit-appearance: none; appearance: none; flex: 1; height: 3px; background: var(--border); border-radius: 2px; outline: none; cursor: pointer; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: var(--accent); cursor: pointer; }

  /* ── Paroles ── */
  .lyrics-toggle {
    width: 100%; margin-top: 16px; padding-top: 16px;
    border: none; border-top: 1px solid var(--border);
    background: none; cursor: pointer; color: var(--muted);
    font-family: 'DM Mono', monospace; font-size: 10px;
    letter-spacing: .15em; text-transform: uppercase;
    display: flex; align-items: center; justify-content: space-between;
    transition: color .2s;
  }
  .lyrics-toggle:hover { color: var(--text); }
  .lyrics-toggle .arrow { transition: transform .25s; display: inline-block; }
  .lyrics-toggle.open .arrow { transform: rotate(180deg); }
  .lyrics-panel { max-height: 0; overflow: hidden; transition: max-height .35s ease; }
  .lyrics-panel.open { max-height: 500px; overflow-y: auto; }
  .lyrics-content { padding: 16px 0 4px; font-size: 13px; line-height: 1.9; color: var(--muted); white-space: pre-wrap; }
  .lyrics-content.has-lyrics { color: var(--text); }

  /* ── Playlist ── */
  .playlist { width: 100%; max-width: 640px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .playlist-header { padding: 14px 20px; font-size: 10px; letter-spacing: .15em; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .playlist-body { max-height: 340px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
  .playlist-item { display: flex; align-items: center; gap: 14px; padding: 12px 20px; cursor: pointer; border-bottom: 1px solid #132848; transition: background .15s; }
  .playlist-item:hover { background: var(--card); }
  .playlist-item.active { background: #ff8c000a; }
  .item-num { font-size: 11px; color: var(--muted); width: 20px; text-align: right; flex-shrink: 0; }
  .playlist-item.active .item-num { display: none; }
  .item-eq { display: none; width: 20px; flex-shrink: 0; align-items: center; justify-content: flex-end; gap: 2px; height: 14px; }
  .playlist-item.active .item-eq { display: flex; }
  .eq-bar { width: 3px; border-radius: 2px; background: var(--accent); animation: eq .6s ease-in-out infinite alternate; }
  .eq-bar:nth-child(2) { animation-delay: .15s; }
  .eq-bar:nth-child(3) { animation-delay: .3s; }
  @keyframes eq { from { height: 4px; } to { height: 14px; } }
  .item-name { flex: 1; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
  .playlist-item.active .item-name { color: var(--accent); }
  .item-plays { font-size: 10px; color: var(--muted); flex-shrink: 0; white-space: nowrap; }
  .item-plays.has-plays { color: var(--accent2); }
  .state-msg { padding: 40px 20px; text-align: center; color: var(--muted); font-size: 13px; }
  .spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 12px; }
</style>
</head>
<body>

<header>
  <span class="logo">▶ Ceremixtape</span>
  <span class="track-count" id="trackCount">chargement…</span>
</header>

<div class="now-playing" id="nowPlaying">
  <div class="vinyl-wrap">
    <div class="cover" id="cover">
      <div class="cover-fallback" id="coverFallback"></div>
    </div>
    <div class="track-info">
      <div class="track-label">En lecture</div>
      <div class="track-title" id="trackTitle">Sélectionne une piste</div>
      <div class="track-index" id="trackIndex">—</div>
    </div>
  </div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-times">
      <span id="timeElapsed">0:00</span>
      <span id="timeDuration">0:00</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-shuffle" id="btnShuffle">⇌</button>
    <button class="btn" id="btnPrev">
      <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
    </button>
    <button class="btn btn-play" id="btnPlay">
      <svg id="iconPlay" width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      <svg id="iconPause" width="22" height="22" fill="currentColor" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6zm8-14v14h4V5z"/></svg>
    </button>
    <button class="btn" id="btnNext">
      <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6zm8.5-6v6H17V6h-2.5z"/></svg>
    </button>
    <button class="btn btn-repeat" id="btnRepeat">↻</button>
  </div>

  <div class="volume-row">
    <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
    <input type="range" id="volume" min="0" max="1" step="0.02" value="0.8">
  </div>

  <button class="lyrics-toggle" id="lyricsToggle">
    <span>Paroles</span>
    <span class="arrow">▾</span>
  </button>
  <div class="lyrics-panel" id="lyricsPanel">
    <div class="lyrics-content" id="lyricsContent">Aucune parole disponible pour cette piste.</div>
  </div>
</div>

<div class="playlist">
  <div class="playlist-header">
    <span>Playlist</span>
    <span id="playlistInfo"></span>
  </div>
  <div class="playlist-body" id="playlistBody">
    <div class="state-msg"><div class="spinner"></div>Chargement…</div>
  </div>
</div>

<audio id="audio" preload="auto"></audio>

<script>
  var MUSIC_FOLDER = "music";
  var COVER_IMAGE  = "cover.png";

  var GH_USER  = "Nongor13";
  var GH_REPO  = "drive-player";
  var GH_TOKEN = "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";
  var GH_API   = "https://api.github.com/repos/" + GH_USER + "/" + GH_REPO + "/contents/playlist.json";

  var tracks       = [];
  var currentIdx   = -1;
  var shuffle      = false;
  var repeat       = false;
  var shuffleOrder = [];
  var lyricsOpen   = false;
  var playlistSha  = null;

  // ── Compteur d'écoutes (GitHub API) ──────────────────────
  function getPlays(file) {
    var t = tracks.find(function(x) { return x.file === file; });
    return t ? (t.plays || 0) : 0;
  }

  function pushPlays() {
    if (!playlistSha) return;
    var payload = tracks.map(function(t) { return { file: t.file, plays: t.plays || 0 }; });
    var encoded = btoa(unescape(encodeURIComponent(JSON.stringify(payload, null, 2) + '\n')));
    fetch(GH_API, {
      method: 'PUT',
      headers: { 'Authorization': 'token ' + GH_TOKEN, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: 'update play counts', content: encoded, sha: playlistSha })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) { if (data.content) playlistSha = data.content.sha; })
    .catch(function(e) { console.warn('Erreur push compteurs :', e); });
  }

  var audio         = document.getElementById('audio');
  var btnPlay       = document.getElementById('btnPlay');
  var iconPlay      = document.getElementById('iconPlay');
  var iconPause     = document.getElementById('iconPause');
  var btnPrev       = document.getElementById('btnPrev');
  var btnNext       = document.getElementById('btnNext');
  var btnShuffle    = document.getElementById('btnShuffle');
  var btnRepeat     = document.getElementById('btnRepeat');
  var progressFill  = document.getElementById('progressFill');
  var progressWrap  = document.getElementById('progressWrap');
  var timeElapsed   = document.getElementById('timeElapsed');
  var timeDuration  = document.getElementById('timeDuration');
  var trackTitle    = document.getElementById('trackTitle');
  var trackIndex    = document.getElementById('trackIndex');
  var trackCount    = document.getElementById('trackCount');
  var playlistBody  = document.getElementById('playlistBody');
  var playlistInfo  = document.getElementById('playlistInfo');
  var nowPlaying    = document.getElementById('nowPlaying');
  var volumeSlider  = document.getElementById('volume');
  var coverEl       = document.getElementById('cover');
  var coverFallback = document.getElementById('coverFallback');
  var lyricsToggle  = document.getElementById('lyricsToggle');
  var lyricsPanel   = document.getElementById('lyricsPanel');
  var lyricsContent = document.getElementById('lyricsContent');

  // ── Pochette commune ─────────────────────────────────────
  var coverImg = new Image();
  coverImg.onload = function() {
    coverImg.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
    coverEl.innerHTML = '';
    coverEl.appendChild(coverImg);
  };
  coverImg.src = COVER_IMAGE;

  // ── Playlist (via GitHub API pour récupérer SHA + compteurs) ──
  fetch(GH_API, { headers: { 'Authorization': 'token ' + GH_TOKEN } })
    .then(function(r) { return r.json(); })
    .then(function(ghFile) {
      playlistSha = ghFile.sha;
      var decoded = JSON.parse(decodeURIComponent(escape(atob(ghFile.content.replace(/\n/g, '')))));
      tracks = decoded.map(function(entry) {
        var f = typeof entry === 'string' ? entry : entry.file;
        return { file: f, name: f.replace(/\.[^/.]+$/, '').replace(/_/g, ' '), plays: entry.plays || 0 };
      });
      trackCount.textContent = tracks.length + ' piste' + (tracks.length > 1 ? 's' : '');
      playlistInfo.textContent = tracks.length + ' titres';
      shuffleOrder = buildShuffleOrder();
      renderPlaylist();
    })
    .catch(function() {
      playlistBody.innerHTML = '<div class="state-msg">❌ playlist.json introuvable</div>';
      trackCount.textContent = 'erreur';
    });

  // ── Paroles ──────────────────────────────────────────────
  function loadLyrics(trackFile) {
    var txtFile = MUSIC_FOLDER + '/' + trackFile.replace(/\.[^/.]+$/, '') + '.txt';
    lyricsContent.textContent = '…';
    lyricsContent.classList.remove('has-lyrics');
    fetch(txtFile)
      .then(function(r) { if (!r.ok) throw new Error(); return r.text(); })
      .then(function(text) {
        lyricsContent.textContent = text;
        lyricsContent.classList.add('has-lyrics');
      })
      .catch(function() {
        lyricsContent.textContent = 'Aucune parole disponible pour cette piste.';
      });
  }

  // ── Load track ───────────────────────────────────────────
  function loadTrack(idx) {
    if (idx < 0 || idx >= tracks.length) return;
    currentIdx = idx;
    var t = tracks[idx];
    audio.src = MUSIC_FOLDER + '/' + encodeURIComponent(t.file);
    audio.volume = parseFloat(volumeSlider.value);
    audio.play();
    setPlayingUI(true);
    trackTitle.textContent = t.name;
    trackIndex.textContent = (idx + 1) + ' / ' + tracks.length;
    t.plays = (t.plays || 0) + 1;
    pushPlays();
    loadLyrics(t.file);
    renderPlaylist();
    scrollToActive();
  }

  function setPlayingUI(playing) {
    iconPlay.style.display  = playing ? 'none'  : 'block';
    iconPause.style.display = playing ? 'block' : 'none';
    nowPlaying.classList.toggle('playing', playing);
  }

  function renderPlaylist() {
    playlistBody.innerHTML = '';
    tracks.forEach(function(t, i) {
      var plays = getPlays(t.file);
      var playsHtml = plays > 0
        ? '<span class="item-plays has-plays">' + plays + ' écoute' + (plays > 1 ? 's' : '') + '</span>'
        : '<span class="item-plays">—</span>';
      var item = document.createElement('div');
      item.className = 'playlist-item' + (i === currentIdx ? ' active' : '');
      item.dataset.idx = i;
      item.innerHTML =
        '<span class="item-num">' + (i + 1) + '</span>' +
        '<span class="item-eq">' +
          '<span class="eq-bar" style="height:8px"></span>' +
          '<span class="eq-bar" style="height:12px"></span>' +
          '<span class="eq-bar" style="height:6px"></span>' +
        '</span>' +
        '<span class="item-name">' + escHtml(t.name) + '</span>' +
        playsHtml;
      item.addEventListener('click', function() { loadTrack(parseInt(this.dataset.idx)); });
      playlistBody.appendChild(item);
    });
  }

  function scrollToActive() {
    var el = playlistBody.querySelector('.playlist-item.active');
    if (el) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }

  function buildShuffleOrder() {
    var arr = tracks.map(function(_, i) { return i; });
    for (var i = arr.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
    }
    return arr;
  }
  function nextShuffleIdx() { var p = shuffleOrder.indexOf(currentIdx); return shuffleOrder[(p + 1) % shuffleOrder.length]; }
  function prevShuffleIdx() { var p = shuffleOrder.indexOf(currentIdx); return shuffleOrder[(p - 1 + shuffleOrder.length) % shuffleOrder.length]; }

  // ── Events ───────────────────────────────────────────────
  lyricsToggle.addEventListener('click', function() {
    lyricsOpen = !lyricsOpen;
    lyricsToggle.classList.toggle('open', lyricsOpen);
    lyricsPanel.classList.toggle('open', lyricsOpen);
  });

  btnPlay.addEventListener('click', function() {
    if (!tracks.length) return;
    if (currentIdx === -1) { loadTrack(0); return; }
    if (audio.paused) { audio.play(); setPlayingUI(true); }
    else              { audio.pause(); setPlayingUI(false); }
  });

  btnPrev.addEventListener('click', function() {
    if (audio.currentTime > 3) { audio.currentTime = 0; return; }
    loadTrack(shuffle ? prevShuffleIdx() : (currentIdx - 1 + tracks.length) % tracks.length);
  });

  btnNext.addEventListener('click', function() {
    loadTrack(shuffle ? nextShuffleIdx() : (currentIdx + 1) % tracks.length);
  });

  btnShuffle.addEventListener('click', function() {
    shuffle = !shuffle;
    btnShuffle.classList.toggle('active', shuffle);
    if (shuffle) shuffleOrder = buildShuffleOrder();
  });

  btnRepeat.addEventListener('click', function() {
    repeat = !repeat;
    btnRepeat.classList.toggle('active', repeat);
  });

  volumeSlider.addEventListener('input', function() { audio.volume = parseFloat(this.value); });

  audio.addEventListener('ended', function() {
    if (repeat) { audio.currentTime = 0; audio.play(); return; }
    var next = shuffle ? nextShuffleIdx() : currentIdx + 1;
    if (next < tracks.length) loadTrack(next);
    else setPlayingUI(false);
  });

  audio.addEventListener('timeupdate', function() {
    if (!audio.duration) return;
    progressFill.style.width = (audio.currentTime / audio.duration * 100) + '%';
    timeElapsed.textContent  = fmt(audio.currentTime);
    timeDuration.textContent = fmt(audio.duration);
  });

  progressWrap.addEventListener('click', function(e) {
    if (!audio.duration) return;
    var rect = this.querySelector('.progress-bar').getBoundingClientRect();
    audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
  });

  function fmt(s) { var m = Math.floor(s/60), sec = Math.floor(s%60); return m + ':' + (sec<10?'0':'') + sec; }
  function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
